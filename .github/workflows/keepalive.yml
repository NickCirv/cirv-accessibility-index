name: keepalive

# The API (Render free web service) sleeps after 15 min idle. Ping it so the
# first real visitor never hits a cold start. The static directory is on a CDN
# and never sleeps, so we only ping the API. No untrusted input is used.
# (Repo is public -> GitHub Actions minutes are free/unlimited.)
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: curl -fsS -m 30 https://cirv-index-api.onrender.com/healthz || true
